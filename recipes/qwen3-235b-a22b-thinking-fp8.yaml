# Recipe: Qwen3-235B-A22B-Thinking-2507-FP8 (TP=2)
# Qwen3-235B-A22B-Thinking-2507 in native FP8 quantization, served at
# tensor_parallel=2 across spark1 + spark2 only.
#
# This is the cluster-executor model for the worker hallucination remediation
# plan (Phase C+D). The Thinking variant is used so the worker gets explicit
# chain-of-thought reasoning at the file-content generation stage.
#
# Why TP=2 and not the validated TP=4 recipe:
#   The existing recipes/4x-spark-cluster/qwen3-235b-thinking-2507-fp8.yaml
#   was benchmarked 2026-04-06 at 5.8 tok/s single / 15.6 tok/s aggregate
#   on ALL 4 sparks. However in the current lean state + Phase B config:
#     - spark3 hosts gpt-oss:120b (cluster-deep-reasoning) — the Phase B
#       worker REVIEWER. Evacuating it would regress the gate safety.
#     - spark4 hosts nemotron-3-super (unused by worker) — safe to reuse.
#   So we run TP=2 on spark1+spark2, leaving spark3 for gpt-oss and
#   spark4 for nemotron + embedding shard.
#
# Memory fit on 2x GB10 Spark (128 GB unified each):
#   - 235B params x 1 byte (FP8) = 235 GB total
#   - TP=2 → 117 GB per shard → fits with ~11 GB headroom
#   - Tight! The 4x recipe used 0.85 utilization comfortably because
#     each shard was only ~59 GB. We need 0.93 here.
#   - max_model_len reduced from 32768 → 8192 to minimize KV cache
#   - max_num_seqs reduced from 16 → 4 to minimize activation memory
#   - kv-cache-dtype fp8 saves KV cache memory ~50%
#
# Both shards are ALREADY CACHED on spark1 and spark2:
#   ~/.cache/huggingface/hub/models--Qwen--Qwen3-235B-A22B-Thinking-2507-FP8/
# No --setup step needed.
#
# Thinking model: worker's file_content_generation max_tokens=32768
# (Phase A.5) is plenty for reasoning trace + content. Worker's gate
# reviewer regex fallback (Phase B.4) tolerates thinking-prefix output.
#
# Settings borrowed from the validated 4x recipe:
#   - VLLM_USE_FLASHINFER_MOE_FP16=1 (FlashInfer MoE kernels with FP8 weights)
#   - --kv-cache-dtype fp8 (saves KV cache memory)
#   - --attention-backend flashinfer
#   - --trust-remote-code
#   - No custom chat-template (uses the model's default)

recipe_version: "1"
name: Qwen3-235B-A22B-Thinking-FP8-TP2
description: vLLM serving Qwen3-235B-A22B-Thinking-2507-FP8 on spark1+spark2 (TP=2). Phase C executor for worker hallucination remediation plan.

# HuggingFace model id (already cached on spark1 + spark2)
model: Qwen/Qwen3-235B-A22B-Thinking-2507-FP8

# Only cluster mode — single spark cannot fit 117 GB shard
cluster_only: true

# Standard vllm-node container (no mxfp4, no tf5)
container: vllm-node

# No mods required per the validated 4x recipe
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.93
  max_model_len: 8192
  max_num_batched_tokens: 8192

# Environment variables — same as the 4x recipe
env:
  OMP_NUM_THREADS: 4
  VLLM_USE_FLASHINFER_MOE_FP16: 1

# The vLLM serve command template. Mirrors the validated 4x recipe with
# the TP=2 + tight-memory adjustments noted above.
command: |
  vllm serve Qwen/Qwen3-235B-A22B-Thinking-2507-FP8 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray \
    --kv-cache-dtype fp8 \
    --attention-backend flashinfer \
    --max-num-seqs 4 \
    --served-model-name Qwen3-235B-A22B-Thinking-FP8
