# Recipe: Qwen3-235B-A22B-Thinking-2507-FP8
# Qwen3-235B-A22B-Thinking model from July 2025 in native FP8 quantization.
# 235B params, A22B active (MoE), thinking-capable.

recipe_version: "1"
name: Qwen3-235B-A22B-Thinking-2507-FP8
description: vLLM serving Qwen3-235B-A22B-Thinking-2507-FP8 — TP=4 across all 4 DGX Sparks

# HuggingFace model id
model: Qwen/Qwen3-235B-A22B-Thinking-2507-FP8

# Only multi-node cluster is supported (235B FP8 won't fit a single Spark)
cluster_only: true

# Container image to use
container: vllm-node

# No mods required for this model
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.85
  max_model_len: 32768
  max_num_batched_tokens: 8192

# Environment variables
# VLLM_USE_FLASHINFER_MOE_FP16=1 — same workaround as the 397B recipe, needed for
#   FlashInfer MoE kernels with FP8 weights to use FP16 internally
env:
  OMP_NUM_THREADS: 4
  VLLM_USE_FLASHINFER_MOE_FP16: 1

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3-235B-A22B-Thinking-2507-FP8 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray \
    --kv-cache-dtype fp8 \
    --attention-backend flashinfer \
    --max-num-seqs 16
